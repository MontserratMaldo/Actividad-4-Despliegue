name: Agenda Automation
on:
  push:
env:
    USER_NAME: Montse Maldonado
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4
      - name: Configurar java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Compilar el proyecto en Maven
        run: mvn compile
      - name: Mostrar usuario
        run: echo "Iniciando pruebas de la agenda de $USER_NAME"
      - name: Ejecutar pruebas unitarias
        run: mvn test
