name: Agenda Automation

on:
  push:

env:
  USER_NAME: Montse Maldonado
  PROJECT_NAME: Agenda
  JAVA_VERSION: '17'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Mostrar usuario
        run: echo "Iniciando pruebas de la agenda de $USER_NAME"

      - name: Mostrar detalles del proyecto
        run: |
          echo "======================================"
          echo "Proyecto: $PROJECT_NAME"
          echo "Estudiante: $USER_NAME"
          echo "Versión de Java: $JAVA_VERSION"
          echo "Rama: ${{ github.ref }}"
          echo "Autor del push: ${{ github.actor }}"
          echo "======================================"

      - name: Compilar proyecto
        run: mvn compile

      - name: Ejecutar pruebas
        run: mvn test